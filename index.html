<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অফিস সহকারি প্রস্তুতি | চাকরির প্রস্তুতি</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --bg4: #212638;
  --surface: #1e2230;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --accent-glow: rgba(59,130,246,0.15);
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
  --pink: #ec4899;
  --teal: #14b8a6;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --r: 10px;
  --r2: 14px;
  --sidebar: 240px;
  --mid: 260px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Hind Siliguri',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.header{
  height:56px;
  background:rgba(13,15,20,0.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
  position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-mark{
  width:36px;height:36px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  background-image: url(logo.png);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;
  box-shadow:0 4px 14px rgba(59,130,246,0.35);
}
.logo-text{font-size:1rem;font-weight:700;color:var(--text);}
.logo-text span{color:var(--accent2);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.ham-btn{
  display:none;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;cursor:pointer;color:var(--text2);font-size:18px;
}
.badge{
  padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;
  background:var(--accent-glow);border:1px solid rgba(59,130,246,0.3);color:var(--accent2);
  letter-spacing:.3px;
}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* ── SIDEBAR (Subjects) ── */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .3s;
}
.sidebar-head{
  padding:14px 14px 8px;
  font-size:.68rem;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text3);
}
.subj-list{overflow-y:auto;flex:1;padding:4px 8px 12px;}
.subj-list::-webkit-scrollbar{width:3px;}
.subj-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.subj-btn{
  width:100%;display:flex;align-items:center;gap:9px;
  padding:10px 10px;border-radius:9px;border:1px solid transparent;
  background:none;cursor:pointer;color:var(--text2);
  font-family:inherit;font-size:.86rem;font-weight:500;
  text-align:left;transition:all .18s;margin-bottom:2px;
}
.subj-btn:hover{background:var(--bg3);color:var(--text);}
.subj-btn.active{background:var(--bg4);color:var(--accent2);border-color:rgba(59,130,246,.3);}
.subj-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.subj-info{display:flex;flex-direction:column;flex:1;min-width:0;}
.subj-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.subj-cnt{font-size:.7rem;color:var(--text3);margin-top:1px;}
.subj-btn.active .subj-cnt{color:rgba(96,165,250,.5);}

/* ── CHAPTER LIST ── */
.chapter-panel{
  width:var(--mid);min-width:var(--mid);
  background:var(--bg);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.chapter-head{
  padding:14px 14px 10px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.chapter-subj{font-size:.7rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:600;}
.chapter-title-big{font-size:1rem;font-weight:700;color:var(--text);}
.chapter-list{overflow-y:auto;flex:1;padding:8px;}
.chapter-list::-webkit-scrollbar{width:3px;}
.chapter-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.chap-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:9px;
  border:1px solid transparent;cursor:pointer;
  transition:all .18s;margin-bottom:3px;
}
.chap-item:hover{background:var(--bg3);border-color:var(--border);}
.chap-item.active{background:var(--bg4);border-color:rgba(59,130,246,.3);}
.chap-num{
  width:26px;height:26px;border-radius:7px;
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:var(--text3);flex-shrink:0;
}
.chap-item.active .chap-num{background:var(--accent-glow);border-color:rgba(59,130,246,.4);color:var(--accent2);}
.chap-info{flex:1;min-width:0;}
.chap-name{font-size:.84rem;font-weight:600;color:var(--text2);line-height:1.3;}
.chap-item.active .chap-name{color:var(--accent2);}
.chap-type-row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.type-tag{
  padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:600;
  display:flex;align-items:center;gap:3px;
}
.tag-video{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.tag-pdf{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2);}
.tag-note{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.2);}

/* ── CONTENT PANEL ── */
.content-panel{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;background:var(--bg);
}
.content-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  color:var(--text3);padding:40px;text-align:center;
}
.empty-ring{
  width:80px;height:80px;border-radius:50%;
  border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
}
.empty-text{font-size:.9rem;line-height:1.6;}
.content-area{flex:1;overflow-y:auto;display:none;}
.content-area::-webkit-scrollbar{width:5px;}
.content-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* Content top bar */
.content-topbar{
  padding:16px 24px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  flex-shrink:0;background:var(--bg);position:sticky;top:0;z-index:10;
}
.content-meta-left{flex:1;}
.content-breadcrumb{
  font-size:.7rem;color:var(--text3);margin-bottom:5px;
  display:flex;align-items:center;gap:5px;
}
.content-main-title{font-size:1.15rem;font-weight:700;line-height:1.35;}
.content-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.ctab{
  padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;
  border:1px solid var(--border2);background:var(--bg3);
  cursor:pointer;color:var(--text2);transition:all .18s;font-family:inherit;
}
.ctab:hover{background:var(--bg4);color:var(--text);}
.ctab.active{background:var(--accent-glow);border-color:rgba(59,130,246,.4);color:var(--accent2);}

/* Tab Panels */
.tab-panel{display:none;padding:20px 24px 32px;}
.tab-panel.show{display:block;}

/* Video */
.video-container{
  background:#000;border-radius:var(--r2);overflow:hidden;
  aspect-ratio:16/9;width:100%;margin-bottom:16px;
  border:1px solid var(--border);
}
.video-container iframe{width:100%;height:100%;border:none;}
.video-placeholder{
  width:100%;aspect-ratio:16/9;
  background:var(--bg3);border-radius:var(--r2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--text3);border:2px dashed var(--border2);
  margin-bottom:16px;
}
.video-placeholder .big-icon{font-size:40px;}
.video-placeholder p{font-size:.85rem;}
.video-info-box{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;
}
.video-info-title{font-size:.95rem;font-weight:700;margin-bottom:6px;}
.video-info-meta{font-size:.78rem;color:var(--text3);display:flex;gap:14px;flex-wrap:wrap;}

/* PDF */
.pdf-embed{
  width:100%;height:70vh;border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;background:var(--bg3);
  margin-bottom:12px;
}
.pdf-embed iframe{width:100%;height:100%;border:none;}
.pdf-placeholder{
  width:100%;height:200px;background:var(--bg3);
  border-radius:var(--r2);border:2px dashed var(--border2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--text3);
}
.pdf-dl-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;background:var(--accent);border-radius:8px;
  color:#fff;font-weight:600;font-size:.85rem;cursor:pointer;
  border:none;font-family:inherit;text-decoration:none;transition:opacity .2s;
}
.pdf-dl-btn:hover{opacity:.85;}

/* Notes */
.note-content{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r2);padding:24px 28px;
  line-height:1.9;font-size:.92rem;color:var(--text2);
}
.note-content h2{
  font-family:'Noto Serif Bengali',serif;
  font-size:1.2rem;color:var(--text);margin:20px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);
}
.note-content h2:first-child{margin-top:0;}
.note-content h3{font-size:1rem;color:var(--accent2);margin:16px 0 7px;}
.note-content p{margin-bottom:10px;}
.note-content ul,
.note-content ol{padding-left:20px;margin-bottom:12px;}
.note-content li{margin-bottom:5px;}
.note-content strong{color:var(--text);font-weight:600;}
.note-content .highlight{
  background:rgba(59,130,246,.1);border-left:3px solid var(--accent);
  padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;
}
.note-content table{
  width:100%;border-collapse:collapse;margin:14px 0;font-size:.87rem;
}
.note-content th{
  background:var(--bg4);color:var(--accent2);
  padding:9px 12px;text-align:left;border:1px solid var(--border2);
  font-weight:600;
}
.note-content td{
  padding:8px 12px;border:1px solid var(--border);
  vertical-align:top;
}
.note-content tr:hover td{background:var(--bg3);}

/* ── MOBILE POPUP ── */
.mob-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
}
.mob-overlay.open{display:flex;align-items:flex-end;}
.mob-sheet{
  width:100%;background:var(--bg2);border-radius:18px 18px 0 0;
  border-top:1px solid var(--border2);max-height:92vh;
  display:flex;flex-direction:column;
  animation:slideUp .26s cubic-bezier(.17,.67,.25,1.08);
}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.mob-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.mob-sheet-head{
  padding:12px 16px 10px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;
}
.mob-sheet-title{font-size:.95rem;font-weight:700;flex:1;padding-right:10px;line-height:1.3;}
.mob-close-btn{
  width:30px;height:30px;background:var(--bg3);border:1px solid var(--border);
  border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:13px;color:var(--text2);flex-shrink:0;
}
.mob-tabs{display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.mob-tabs::-webkit-scrollbar{display:none;}
.mob-tab{
  padding:6px 14px;border-radius:16px;border:1px solid var(--border2);
  background:var(--bg3);font-size:.78rem;font-weight:600;cursor:pointer;
  color:var(--text2);white-space:nowrap;font-family:inherit;
}
.mob-tab.active{background:var(--accent-glow);border-color:rgba(59,130,246,.4);color:var(--accent2);}
.mob-body{overflow-y:auto;flex:1;padding:14px 14px 24px;}
.mob-body::-webkit-scrollbar{width:3px;}
.mob-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── MOBILE LAYOUT ── */
.mob-main{display:none;flex-direction:column;min-height:calc(100vh - 56px);}
.mob-subj-bar{
  padding:12px 12px 8px;border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.mob-subj-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
.mob-subj-scroll::-webkit-scrollbar{display:none;}
.mob-subj-pill{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;font-size:.8rem;font-weight:600;
  color:var(--text2);white-space:nowrap;font-family:inherit;
  transition:all .18s;
}
.mob-subj-pill.active{background:var(--bg4);border-color:rgba(59,130,246,.4);color:var(--accent2);}
.mob-chapter-list{flex:1;overflow-y:auto;padding:10px;}
.mob-chap-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px 14px;cursor:pointer;
  margin-bottom:8px;transition:all .18s;
}
.mob-chap-card:hover{border-color:var(--border2);}
.mob-chap-num{
  font-size:.68rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;
}
.mob-chap-name{font-size:.9rem;font-weight:700;margin-bottom:7px;}
.mob-chap-types{display:flex;gap:5px;flex-wrap:wrap;}

@media(max-width:768px){
  .sidebar,.chapter-panel,.content-panel{display:none;}
  .mob-main{display:flex;}
  .ham-btn{display:flex;}
}
@media(min-width:769px){
  .mob-main,.mob-overlay{display:none!important;}
}
</style>
</head>
<body>

<header class="header">
  <a class="logo" href="#">
    <div class="logo-mark"></div>
    <span class="logo-text">চাকরি<span>প্রস্তুতি</span></span>
  </a>
  <div class="header-right">
    <span class="badge">অফিস সহকারি · কম্পিউটার মুদ্রাক্ষরিক</span>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR: Subjects -->
  <aside class="sidebar">
    <div class="sidebar-head">বিষয়</div>
    <div class="subj-list" id="subjList"></div>
  </aside>

  <!-- CHAPTER LIST -->
  <div class="chapter-panel">
    <div class="chapter-head">
      <div class="chapter-subj" id="chapSubjLabel">বিষয় বেছে নিন</div>
      <div class="chapter-title-big" id="chapTitleBig">অধ্যায়সমূহ</div>
    </div>
    <div class="chapter-list" id="chapList"></div>
  </div>

  <!-- CONTENT -->
  <div class="content-panel">
    <div class="content-empty" id="contentEmpty">
      <div class="empty-ring">📚</div>
      <div class="empty-text">বাম থেকে বিষয় ও অধ্যায় বেছে নিন<br>কন্টেন্ট এখানে দেখাবে</div>
    </div>
    <div class="content-area" id="contentArea">
      <div class="content-topbar">
        <div class="content-meta-left">
          <div class="content-breadcrumb" id="breadcrumb"></div>
          <div class="content-main-title" id="contentTitle"></div>
          <div class="content-tabs" id="contentTabs"></div>
        </div>
      </div>
      <div id="tabPanels"></div>
    </div>
  </div>

</div>

<!-- MOBILE -->
<div class="mob-main" id="mobMain">
  <div class="mob-subj-bar">
    <div class="mob-subj-scroll" id="mobSubjScroll"></div>
  </div>
  <div class="mob-chapter-list" id="mobChapList"></div>
</div>

<!-- MOBILE POPUP -->
<div class="mob-overlay" id="mobOverlay" onclick="mobOverlayClick(event)">
  <div class="mob-sheet">
    <div class="mob-drag"></div>
    <div class="mob-sheet-head">
      <div class="mob-sheet-title" id="mobPopupTitle">—</div>
      <button class="mob-close-btn" onclick="closeMobPopup()">✕</button>
    </div>
    <div class="mob-tabs" id="mobTabs"></div>
    <div class="mob-body" id="mobBody"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  DATA — এখানে আপনার কন্টেন্ট যোগ করুন
// ════════════════════════════════════════════════════════
const SUBJECTS = [
  {
    id:'bangla', icon:'অ', color:'#f472b6', bg:'rgba(244,114,182,0.15)', name:'বাংলা',
    chapters:[
      {
        id:'b1', name:'ব্যাকরণ: বাক্য ও পদ',
        video:{ ytId:'5VC7tQiDur0', title:'বাক্য ও পদ পরিচয়', duration:'', note:'ভিডিও শীঘ্রই আসছে' },
        pdf:{ url:'https://pdfobject.com/pdf/sample.pdf', title:'বাক্য ও পদ — নোটশীট', note:'পিডিএফ শীঘ্রই আসছে' },
        notes:`
<h2>বাক্য কী?</h2>
<p>যে পদ বা পদসমষ্টি দ্বারা কোনো বিষয়ে সম্পূর্ণ মনোভাব প্রকাশ পায়, তাকে <strong>বাক্য</strong> বলে।</p>
<div class="highlight">বাক্যের তিনটি গুণ: <strong>আকাঙ্ক্ষা, আসক্তি ও যোগ্যতা</strong></div>
<h3>পদ কী?</h3>
<p>বিভক্তিযুক্ত শব্দকে পদ বলে। পদ পাঁচ প্রকার।</p>
<table>
  <tr><th>পদের নাম</th><th>সংজ্ঞা</th><th>উদাহরণ</th></tr>
  <tr><td>বিশেষ্য</td><td>কোনো কিছুর নাম বোঝায়</td><td>রহিম, ঢাকা, বই</td></tr>
  <tr><td>সর্বনাম</td><td>বিশেষ্যের পরিবর্তে ব্যবহৃত</td><td>সে, তুমি, আমি</td></tr>
  <tr><td>বিশেষণ</td><td>বিশেষ্যের দোষ-গুণ বোঝায়</td><td>ভালো, সুন্দর</td></tr>
  <tr><td>ক্রিয়া</td><td>কাজ বোঝায়</td><td>যায়, খায়, পড়ে</td></tr>
  <tr><td>অব্যয়</td><td>অপরিবর্তিত থাকে</td><td>এবং, কিন্তু, তাই</td></tr>
</table>`
      },
      {
        id:'b2', name:'সন্ধি বিচ্ছেদ',
        video:{ ytId:'', title:'সন্ধির নিয়মাবলী', duration:'', note:'ভিডিও শীঘ্রই আসছে' },

<p>কাজ সম্পন্ন হওয়ার সময়কে Tense বলে। মূলত ৩ প্রকার: Present, Past, Future। প্রতিটি আবার ৪ ভাগে বিভক্ত।</p>

<table>
  <tr><th>প্রকার</th><th>Structure</th><th>Example</th></tr>
  <tr><td>Simple</td><td>Sub + V1(s/es)</td><td>He reads books.</td></tr>
  <tr><td>Continuous</td><td>Sub + am/is/are + V-ing</td><td>He is reading.</td></tr>
  <tr><td>Perfect</td><td>Sub + has/have + V3</td><td>He has read.</td></tr>
  <tr><td>Perfect Continuous</td><td>Sub + has/have been + V-ing</td><td>He has been reading.</td></tr>
</table>
<h3>চেনার সংকেত</h3>

  <strong>Present Perfect:</strong> just, already, ever, never, yet — এই শব্দ দেখলে has/have + V3।
</div>`

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let activeSub = SUBJECTS[0].id;
let activeChap = null;
let activeTab = 'notes';

// ── HELPERS ──
function getSubject(id){ return SUBJECTS.find(s=>s.id===id); }
function getChapter(sid,cid){ return getSubject(sid)?.chapters.find(c=>c.id===cid); }
function hasVideo(c){ return c.video?.ytId?.length>0; }
function hasPdf(c){ return c.pdf?.url?.length>0; }

function chapTypes(c){
  const tags=[];
  if(hasVideo(c)) tags.push('<span class="type-tag tag-video">▶ ভিডিও</span>');
  if(hasPdf(c))   tags.push('<span class="type-tag tag-pdf">📄 PDF</span>');
  tags.push('<span class="type-tag tag-note">📝 নোট</span>');
  return tags.join('');
}

// ── BUILD SUBJECTS ──
function buildSubjects(){
  const sl=document.getElementById('subjList');
  sl.innerHTML=SUBJECTS.map(s=>`
    <button class="subj-btn ${s.id===activeSub?'active':''}" onclick="selectSub('${s.id}')">
      <div class="subj-icon" style="background:${s.bg};color:${s.color}">${s.icon}</div>
      <div class="subj-info">
        <span class="subj-name">${s.name}</span>
        <span class="subj-cnt">${s.chapters.length}টি অধ্যায়</span>
      </div>
    </button>`).join('');

  const msp=document.getElementById('mobSubjScroll');
  msp.innerHTML=SUBJECTS.map(s=>`
    <button class="mob-subj-pill ${s.id===activeSub?'active':''}"
      onclick="selectSub('${s.id}',true)"
      style="${s.id===activeSub?`border-color:${s.color};color:${s.color}`:''}">
      ${s.icon} ${s.name}
    </button>`).join('');
}

// ── BUILD CHAPTERS ──
function buildChapters(sid){
  const sub=getSubject(sid);
  document.getElementById('chapSubjLabel').textContent=sub.name;
  document.getElementById('chapTitleBig').textContent='অধ্যায়সমূহ';

  const cl=document.getElementById('chapList');
  cl.innerHTML=sub.chapters.map((c,i)=>`
    <div class="chap-item ${c.id===activeChap?'active':''}" onclick="selectChap('${sid}','${c.id}')">
      <div class="chap-num">${i+1}</div>
      <div class="chap-info">
        <div class="chap-name">${c.name}</div>
        <div class="chap-type-row">${chapTypes(c)}</div>
      </div>
    </div>`).join('');

  const mcl=document.getElementById('mobChapList');
  mcl.innerHTML=sub.chapters.map((c,i)=>`
    <div class="mob-chap-card" onclick="openMobPopup('${sid}','${c.id}')">
      <div class="mob-chap-num">অধ্যায় ${i+1}</div>
      <div class="mob-chap-name">${c.name}</div>
      <div class="mob-chap-types">${chapTypes(c)}</div>
    </div>`).join('');
}

// ── BUILD CONTENT ──
function buildContent(sid,cid){
  const sub=getSubject(sid);
  const chap=getChapter(sid,cid);
  if(!chap) return;

  // breadcrumb
  document.getElementById('breadcrumb').innerHTML=
    `<span>${sub.icon} ${sub.name}</span><span>›</span><span style="color:var(--text2)">অধ্যায়</span>`;
  document.getElementById('contentTitle').textContent=chap.name;

  // tabs
  const tabs=[{id:'notes',label:'📝 নোট'}];
  if(hasVideo(chap)) tabs.unshift({id:'video',label:'▶ ভিডিও'});
  if(hasPdf(chap))   tabs.splice(hasVideo(chap)?1:0,0,{id:'pdf',label:'📄 PDF'});

  document.getElementById('contentTabs').innerHTML=
    tabs.map(t=>`<button class="ctab ${t.id===activeTab?'active':''}"
      onclick="switchTab('${t.id}',false)">${t.label}</button>`).join('');

  renderTabPanels(chap,false);

  document.getElementById('contentEmpty').style.display='none';
  document.getElementById('contentArea').style.display='block';
}

function renderTabPanels(chap,isMobile){
  const panelsEl=isMobile?document.getElementById('mobBody'):document.getElementById('tabPanels');
  let html='';

  // VIDEO
  const showV=!isMobile||activeTab==='video';
  const vshow=(!isMobile&&activeTab==='video')||( isMobile&&activeTab==='video');
  if(hasVideo(chap)){
    html+=`<div class="tab-panel ${activeTab==='video'?'show':''}" id="${isMobile?'mob-':''}panel-video">
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/${chap.video.ytId}?rel=0"
          allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope"></iframe>
      </div>
      <div class="video-info-box">
        <div class="video-info-title">${chap.video.title||chap.name}</div>
        <div class="video-info-meta">
          ${chap.video.duration?`<span>⏱ ${chap.video.duration}</span>`:''}
        </div>
      </div>
    </div>`;
  } else {
    html+=`<div class="tab-panel ${activeTab==='video'?'show':''}" id="${isMobile?'mob-':''}panel-video">
      <div class="video-placeholder">
        <div class="big-icon">▶</div>
        <p>${chap.video?.note||'ভিডিও শীঘ্রই আসছে'}</p>
      </div>
    </div>`;
  }

  // PDF
  if(hasPdf(chap)){
    html+=`<div class="tab-panel ${activeTab==='pdf'?'show':''}" id="${isMobile?'mob-':''}panel-pdf">
      <div class="pdf-embed">
        <iframe src="${chap.pdf.url}"></iframe>
      </div>
      <a class="pdf-dl-btn" href="${chap.pdf.url}" target="_blank" download>
        ⬇ PDF ডাউনলোড করুন
      </a>
    </div>`;
  } else {
    html+=`<div class="tab-panel ${activeTab==='pdf'?'show':''}" id="${isMobile?'mob-':''}panel-pdf">
      <div class="pdf-placeholder">
        <span style="font-size:32px">📄</span>
        <p>${chap.pdf?.note||'PDF শীঘ্রই আসছে'}</p>
      </div>
    </div>`;
  }

  // NOTES
  html+=`<div class="tab-panel ${activeTab==='notes'?'show':''}" id="${isMobile?'mob-':''}panel-notes">
    <div class="note-content">${chap.notes||'নোট শীঘ্রই আসছে।'}</div>
  </div>`;

  panelsEl.innerHTML=html;
}

// ── SELECT SUBJECT ──
function selectSub(sid,isMobile=false){
  activeSub=sid; activeChap=null; activeTab='notes';
  buildSubjects();
  buildChapters(sid);
  document.getElementById('contentEmpty').style.display='flex';
  document.getElementById('contentArea').style.display='none';
}

// ── SELECT CHAPTER ──
function selectChap(sid,cid){
  activeChap=cid; activeTab='notes';
  buildChapters(sid);
  buildContent(sid,cid);
}

// ── SWITCH TAB (desktop) ──
function switchTab(tabId,isMobile){
  activeTab=tabId;
  if(isMobile){
    document.querySelectorAll('.mob-tab').forEach(t=>{
      t.classList.toggle('active',t.dataset.tab===tabId);
    });
    const chap=getChapter(activeSub,activeChap);
    if(chap) renderTabPanels(chap,true);
  } else {
    document.querySelectorAll('.ctab').forEach(t=>{
      t.classList.toggle('active',t.textContent.includes(
        tabId==='video'?'ভিডিও':tabId==='pdf'?'PDF':'নোট'
      ));
    });
    document.querySelectorAll('.tab-panel').forEach(p=>{
      const id=p.id.replace('panel-','');
      p.classList.toggle('show',id===tabId);
    });
  }
}

// ── MOBILE POPUP ──
function openMobPopup(sid,cid){
  activeSub=sid; activeChap=cid; activeTab='notes';
  const chap=getChapter(sid,cid);
  const sub=getSubject(sid);

  document.getElementById('mobPopupTitle').textContent=chap.name;

  const tabs=[{id:'notes',label:'📝 নোট'}];
  if(hasVideo(chap)) tabs.unshift({id:'video',label:'▶ ভিডিও'});
  if(hasPdf(chap))   tabs.splice(hasVideo(chap)?1:0,0,{id:'pdf',label:'📄 PDF'});

  document.getElementById('mobTabs').innerHTML=
    tabs.map(t=>`<button class="mob-tab ${t.id===activeTab?'active':''}"
      data-tab="${t.id}" onclick="switchTab('${t.id}',true)">${t.label}</button>`).join('');

  renderTabPanels(chap,true);

  document.getElementById('mobOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function mobOverlayClick(e){
  if(e.target===document.getElementById('mobOverlay')) closeMobPopup();
}
function closeMobPopup(){
  document.getElementById('mobOverlay').classList.remove('open');
  document.body.style.overflow='';
  // stop video
  document.getElementById('mobBody').innerHTML='';
}

// ── INIT ──
buildSubjects();
buildChapters(activeSub);
</script>
</body>
</html>
